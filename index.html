<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MallJasa - Prototype</title>
    <style>
        body {
            background-color: #FFF9E3; /* Warna krem sesuai kulit kuning langsat */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            width: 100%;
            padding: 20px;
            text-align: center;
            background-color: #ffffff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .container {
            max-width: 450px; 
            width: 100%;
            padding: 10px;
        }
        img {
            width: 100%;
            height: auto;
            display: block;
            margin-bottom: 15px;
            border-radius: 20px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            font-size: 1.2rem;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>MallJasa Prototype</h1>
    </div>
    
    <div class="container">
        <img src="Tampilan-1.jpeg" alt="Screen 1">
        <img src="Tampilan-2.jpeg" alt="Screen 2">
        <img src="Tampilan-3.jpeg" alt="Screen 3">
        <img src="Tampilan-4.jpeg" alt="Screen 4">
        <img src="Tampilan-5.jpeg" alt="Screen 5">
        <img src="Tampilan-6.png" alt="Screen 6"> <img src="Tampilan-7.png" alt="Screen 7"> </div>
</body>
</html>
